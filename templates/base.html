{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="icon" type="image/x-icon" href="{% static 'images/1.png' %}">
  <title>
    AstronX Finance Limited : {% block title %}{% endblock title %}
  </title>
  <style>
    #logo {
      position: relative;
      width: 100px;
      height: 70px;
      padding: 10px;
      user-select: none;
    }
    #head-font {
      font-family: 'Times New Roman', Times, serif;
      user-select: none;
    }
    body {
      font-family: 'Times New Roman', Times, serif;
    }
  </style>
  <!--Chart Js CDN-->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
  <center>
    <img id="logo" src="{% static 'images/1.png' %}" alt="logo of the astronx finance limited">
  </center>
  <center>
    <h4 id="head-font">
      AstronX Finance Limited
    </h4>
  </center>
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" id="page1" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="page2" href="/about">About us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" id="page3" href="/audit">Audit your wealth</a>
            </li>
          </ul>
          <form class="d-flex">
            {% if user.is_authenticated %}
            <a href="{% url 'logout' %}"><button type="button" class="btn btn-outline-primary m-2">Logout</button></a>
            {% else %}
            <a href="{% url 'login' %}"><button type="button" class="btn btn-outline-primary m-2">Login to Database</button></a>
            {% endif %}
          </form>
        </div>
      </div>
    </nav>
  </div>
  <br>
  {% block body %}

  {% endblock body %}
  <br>
  <div class="container">
    <center>
      <footer class="blog-footer">
        <p>Copyrights of AstronX Finance Limited</p>
        <p><a href="#">Back to top</a></p>
      </footer>
    </center>
  </div>
  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>


  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
    integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
    integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
    crossorigin="anonymous"></script>

</body>

</html>
