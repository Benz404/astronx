{% extends 'base.html' %}
{% load static %}
{% block title %}Home{% endblock title %}

{% block body %}
<div class="container">
    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="{% static 'images/image1.jpg' %}" class="d-block w-100" alt="image1">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/image2.jpg' %}" class="d-block w-100" alt="image2">
            </div>
            <div class="carousel-item">
                <img src="{% static 'images/image3.jpg' %}" class="d-block w-100" alt="image3">
            </div>
        </div>
    </div>
</div>
<div class="container">
    <div class="container m-3">
        <center>
            <h5>Analysis Section</h5>
        </center>
    </div>
</div>
<div class="container">
    <div class="container">
        <div class="row">
            <div class="col-4">
                <center>
                    <div class="card m-2" style="width: 18rem;">
                        <img src="{% static 'images/label1.jpg' %}" class="card-img-top" alt="...">
                    </div>
                    <a href="{% url 'database' %}">
                        <button type="button" class="btn btn-success">
                            <center>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="15" fill="currentColor"
                                    class="bi bi-bar-chart-line" viewBox="0 0 16 16">
                                    <path
                                        d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h1V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7h1V2zm1 12h2V2h-2v12zm-3 0V7H7v7h2zm-5 0v-3H2v3h2z">
                                    </path>
                                </svg>
                                Get into the Database
                            </center>
                        </button>
                    </a>
                </center>
            </div>
            <div class="col-4">
                <center>
                    <div class="card m-2" style="width: 18rem;">
                        <img src="{% static 'images/label2.jpg' %}" class="card-img-top" alt="...">
                    </div>
                    <a href="{% url 'graph' %}">
                        <button type="button" class="btn btn-success">
                            <center>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-graph-up-arrow" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd"
                                        d="M0 0h1v15h15v1H0V0Zm10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4.9l-3.613 4.417a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61L13.445 4H10.5a.5.5 0 0 1-.5-.5Z" />
                                </svg>
                                <path
                                    d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h1V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7h1V2zm1 12h2V2h-2v12zm-3 0V7H7v7h2zm-5 0v-3H2v3h2z">
                                </path>
                                </svg>
                                Visual representation
                            </center>
                        </button>
                    </a>
                </center>
            </div>
            <div class="col-4">
                <center>
                    <div class="card m-2" style="width: 18rem;">
                        <img src="{% static 'images/label3.jpg' %}" class="card-img-top" alt="...">
                    </div>
                    <a href="{% url 'superpage' %}">
                        <button type="button" class="btn btn-success">
                            <center>
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="15" fill="currentColor"
                                    class="bi bi-bar-chart-line" viewBox="0 0 16 16">
                                    <path
                                        d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h1V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7h1V2zm1 12h2V2h-2v12zm-3 0V7H7v7h2zm-5 0v-3H2v3h2z">
                                    </path>
                                </svg>
                                Get into the super database

                </center>

        </div>
    </div>
